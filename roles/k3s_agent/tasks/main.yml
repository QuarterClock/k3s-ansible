---
- name: Check for PXE-booted system
  block:
    - name: Check if system is PXE-booted
      ansible.builtin.command:
        cmd: cat /proc/cmdline
      register: boot_cmdline
      changed_when: false
      check_mode: false

    - name: Set fact for PXE-booted system
      ansible.builtin.set_fact:
        is_pxe_booted: "{{ 'root=/dev/nfs' in boot_cmdline.stdout }}"
      when: boot_cmdline.stdout is defined

    - name: Include http_proxy configuration tasks
      ansible.builtin.include_tasks: http_proxy.yml

- name: Deploy K3s http_proxy conf
  ansible.builtin.include_tasks: http_proxy.yml
  when: proxy_env is defined

- name: Configure the k3s service
  ansible.builtin.template:
    src: k3s.service.j2
    dest: "{{ systemd_dir }}/k3s-node.service"
    owner: root
    group: root
    mode: "0755"

# Preflight: the `k3s-node.service` systemd unit is Type=notify with
# TimeoutStartSec=0. If the API VIP is missing, k3s-agent enters the
# "Failed to validate connection to cluster" retry loop and never fires
# sd_notify READY=1, so the restart below blocks indefinitely. Checking
# VIP reachability here fails fast in ~90s with a clear message instead
# of silently hanging for 5+ minutes.
- name: Wait for API VIP to be reachable from agent on {{ apiserver_endpoint }}
  ansible.builtin.wait_for:
    host: "{{ apiserver_endpoint }}"
    port: 6443
    timeout: 90
    delay: 2
    state: started

- name: Manage k3s service
  ansible.builtin.systemd:
    name: k3s-node
    daemon_reload: true
    state: restarted
    enabled: true
