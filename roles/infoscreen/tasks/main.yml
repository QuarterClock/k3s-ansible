---
- name: Execute steps for action {{ action_ }}
  ansible.builtin.include_tasks: "{{ action_ }}/main.yml"
  vars:
    action_: >-
      {% if infoscreen_state == "present" %}setup{% else %}teardown{% endif %}
  when:
    - raspberry_pi | default(false)
    - (infoscreen_state == "present" and infoscreen_enabled | bool) or infoscreen_state == "absent"
