---
extra_server_args: ""

# Disable k3s-bundled ServiceLB (klipper) and Traefik. Use Cilium/MetalLB
# and GitOps (e.g. home-infra Argo CD) for LoadBalancer and ingress instead.
# Set to [] to keep k3s defaults.
k3s_bundled_disable:
  - servicelb
  - traefik

k3s_kubectl_binary: k3s kubectl

group_name_master: master

kube_vip_arp: true
kube_vip_iface:
kube_vip_cloud_provider_tag_version: main
kube_vip_tag_version: v0.7.2

kube_vip_bgp: false
kube_vip_bgp_routerid: 127.0.0.1
kube_vip_bgp_as: "64513"
kube_vip_bgp_peeraddress: 192.168.30.1
kube_vip_bgp_peeras: "64512"

kube_vip_bgp_peers: []
kube_vip_bgp_peers_groups: ["k3s_master"]

metal_lb_controller_tag_version: v0.14.3
metal_lb_speaker_tag_version: v0.14.3
metal_lb_type: native

retry_count: 20

# yamllint disable rule:line-length
# Must match k3s.service.j2: k3s-init runs before the unit file exists, so bundled
# disables belong here too — otherwise Traefik/ServiceLB install on first boot.
server_init_args: >-
  {% if groups[group_name_master | default('master')] | length > 1 %}
    {% if ansible_hostname == hostvars[groups[group_name_master | default('master')][0]]['ansible_hostname'] %}
      --cluster-init
    {% else %}
      --server https://{{ hostvars[groups[group_name_master | default('master')][0]].k3s_node_ip | split(",") | first | ansible.utils.ipwrap }}:6443
    {% endif %}
    --token {{ k3s_token }}
  {% endif %}
  {% for c in k3s_bundled_disable | default([]) %}--disable {{ c }} {% endfor %}
  {{ extra_server_args }}

systemd_dir: /etc/systemd/system
