---
- name: Stop k3s-init
  ansible.builtin.systemd:
    name: k3s-init
    state: stopped
  failed_when: false

# k3s-init won't work if the port is already in use
- name: Stop k3s
  ansible.builtin.systemd:
    name: k3s
    state: stopped
  failed_when: false

- name: Clean previous runs of k3s-init # noqa command-instead-of-module
  # The systemd module does not support "reset-failed", so we need to resort to command.
  ansible.builtin.command: systemctl reset-failed k3s-init
  failed_when: false
  changed_when: false

- name: Deploy K3s http_proxy conf
  ansible.builtin.include_tasks: http_proxy.yml
  when: proxy_env is defined

- name: Deploy vip manifest
  ansible.builtin.include_tasks: vip.yml
- name: Deploy metallb manifest
  ansible.builtin.include_tasks: metallb.yml
  tags: metallb
  when: kube_vip_lb_ip_range is not defined and (not cilium_bgp or cilium_iface is not defined)

- name: Deploy kube-vip manifest
  ansible.builtin.include_tasks: kube-vip.yml
  tags: kubevip
  when: kube_vip_lb_ip_range is defined

- name: Init cluster inside the transient k3s-init service
  ansible.builtin.command:
    cmd: systemd-run -p RestartSec=2 -p Restart=on-failure --unit=k3s-init k3s server {{ server_init_args }}
    creates: "{{ systemd_dir }}/k3s-init.service"

- name: Verification
  when: not ansible_check_mode
  block:
    # With external CNI (Cilium/Calico), nodes stay NotReady until k3s_server_post — we only need API + registration.
    # Newer Kubernetes uses node-role.kubernetes.io/control-plane; legacy master= label alone would match zero nodes.
    - name: Verify control-plane nodes are registered (check k3s-init.service if this fails) # noqa risky-shell-pipe
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          {{ k3s_kubectl_binary | default('k3s kubectl') }} get nodes -o json \
            | python3 -c "$(cat <<'PY'
          import json, sys
          d = json.load(sys.stdin)
          roles = (
              'node-role.kubernetes.io/control-plane',
              'node-role.kubernetes.io/master',
          )
          names = [
              i['metadata']['name']
              for i in d.get('items', [])
              if any(r in (i.get('metadata', {}).get('labels') or {}) for r in roles)
          ]
          print(' '.join(names))
          PY
          )"
        executable: /bin/bash
      register: nodes
      until: >-
        nodes.rc == 0
        and ((nodes.stdout | default('')).split() | length)
        >= (1 + (groups[group_name_master | default('master')] | list).index(inventory_hostname))
      retries: "{{ retry_count | default(20) }}"
      delay: 10
      changed_when: false
  always:
    - name: Save logs of k3s-init.service
      ansible.builtin.include_tasks: fetch_k3s_init_logs.yml
      when: log_destination
      vars:
        log_destination: >-
          {{ lookup('ansible.builtin.env', 'ANSIBLE_K3S_LOG_DIR', default=False) }}
    - name: Kill the temporary service used for initialization
      ansible.builtin.systemd:
        name: k3s-init
        state: stopped
      failed_when: false

- name: Copy K3s service file
  register: k3s_service
  ansible.builtin.template:
    src: k3s.service.j2
    dest: "{{ systemd_dir }}/k3s.service"
    owner: root
    group: root
    mode: "0644"

- name: Enable and check K3s service
  ansible.builtin.systemd:
    name: k3s
    daemon_reload: true
    state: restarted
    enabled: true

# The three tasks below close a first-boot race that otherwise leaves the
# cluster without the kube-vip DaemonSet (and therefore without the API VIP):
#
#   1. `k3s-init` drops manifests into /var/lib/rancher/k3s/server/manifests/
#      and k3s's addon-deployer applies them asynchronously.
#   2. The Verification block only waits for *node registration*, not for the
#      addon-deployer to finish, so Ansible can kill k3s-init mid-apply.
#   3. Later in this role the manifest files are deleted from disk. If the
#      addon-deployer hasn't picked them up yet when `k3s.service` restarts,
#      the DaemonSet is simply never created — the VIP never comes up — every
#      agent's `Manage k3s service` task hangs for 5+ minutes on sd_notify.
#
# Doing an explicit `kubectl apply` + readiness wait here makes the role
# self-healing regardless of addon-deployer timing, and fails fast with a
# clear message if kube-vip can't actually run (bad image pull, missing
# control-plane label, wrong interface, etc.) instead of cascading into the
# agent role as a silent hang.

- name: Re-apply bootstrap manifests (idempotent; closes the addon-deployer race)
  ansible.builtin.command:
    cmd: "{{ k3s_kubectl_binary | default('k3s kubectl') }} apply -f /var/lib/rancher/k3s/server/manifests/"
  register: bootstrap_manifests_apply
  changed_when: >-
    bootstrap_manifests_apply.rc == 0
    and ('configured' in (bootstrap_manifests_apply.stdout | default(''))
         or 'created' in (bootstrap_manifests_apply.stdout | default('')))
  until: bootstrap_manifests_apply.rc == 0
  retries: 24
  delay: 5
  when: ansible_hostname == hostvars[groups[group_name_master | default('master')][0]]['ansible_hostname']

- name: Wait for kube-vip DaemonSet to have at least one Ready pod
  ansible.builtin.command:
    cmd: >-
      {{ k3s_kubectl_binary | default('k3s kubectl') }}
      -n kube-system get ds kube-vip-ds -o jsonpath={.status.numberReady}
  register: kube_vip_ds_ready
  changed_when: false
  until: kube_vip_ds_ready.rc == 0 and (kube_vip_ds_ready.stdout | default('0') | int) >= 1
  retries: 36
  delay: 5
  when: ansible_hostname == hostvars[groups[group_name_master | default('master')][0]]['ansible_hostname']

- name: Wait for API VIP to be reachable on {{ apiserver_endpoint }}
  ansible.builtin.wait_for:
    host: "{{ apiserver_endpoint }}"
    port: 6443
    timeout: 180
    delay: 2
    state: started
  when: ansible_hostname == hostvars[groups[group_name_master | default('master')][0]]['ansible_hostname']

- name: Wait for node-token
  ansible.builtin.wait_for:
    path: /var/lib/rancher/k3s/server/node-token

- name: Register node-token file access mode
  ansible.builtin.stat:
    path: /var/lib/rancher/k3s/server
  register: p

- name: Change file access node-token
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/server
    mode: g+rx,o+rx

- name: Read node-token from master
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: node_token

- name: Store Master node-token
  ansible.builtin.set_fact:
    token: "{{ node_token.content | b64decode | regex_replace('\n', '') }}"

- name: Restore node-token file access
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/server
    mode: "{{ p.stat.mode }}"

- name: Create directory .kube
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.kube"
    state: directory
    owner: "{{ ansible_user_id }}"
    mode: u=rwx,g=rx,o=

- name: Copy config file to user home directory
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "{{ ansible_user_dir }}/.kube/config"
    remote_src: true
    owner: "{{ ansible_user_id }}"
    mode: u=rw,g=,o=

- name: Configure kubectl cluster to {{ endpoint_url }}
  ansible.builtin.command: >-
    {{ k3s_kubectl_binary | default('k3s kubectl') }} config set-cluster default
      --server={{ endpoint_url }}
      --kubeconfig {{ ansible_user_dir }}/.kube/config
  changed_when: true
  vars:
    endpoint_url: >-
      https://{{ apiserver_endpoint | ansible.utils.ipwrap }}:6443
# Deactivated linter rules:
#   - jinja[invalid]: As of version 6.6.0, ansible-lint complains that the input to ipwrap
#                     would be undefined. This will not be the case during playbook execution.
# noqa jinja[invalid]

- name: Create kubectl symlink
  ansible.builtin.file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/kubectl
    state: link
  when: k3s_create_kubectl_symlink | default(true) | bool

- name: Create crictl symlink
  ansible.builtin.file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/crictl
    state: link
  when: k3s_create_crictl_symlink | default(true) | bool

- name: Get contents of manifests folder
  ansible.builtin.find:
    paths: /var/lib/rancher/k3s/server/manifests
    file_type: file
  register: k3s_server_manifests

- name: Get sub dirs of manifests folder
  ansible.builtin.find:
    paths: /var/lib/rancher/k3s/server/manifests
    file_type: directory
  register: k3s_server_manifests_directories

- name: Remove manifests and folders that are only needed for bootstrapping cluster so k3s doesn't auto apply on start
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  with_items:
    - "{{ k3s_server_manifests.files }}"
    - "{{ k3s_server_manifests_directories.files }}"
  loop_control:
    label: "{{ item.path }}"
